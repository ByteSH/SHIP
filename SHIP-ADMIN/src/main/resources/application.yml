spring:
  application:
    name: SHIP-ADMIN

# Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

# JPA & Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true


# Mail Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  web:
    error:
      include-stacktrace: never


server:
  port: ${SERVER_PORT}
  server-header: ""


# Logging Configuration
logging:
  level:
    root: INFO
    com.connect: DEBUG
    org.hibernate.SQL: ERROR


# Spring Security Configuration
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
    admin:
      usernames: ${ADMIN_USERS}
      passwords: ${ADMIN_PASSWORDS}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:5}


# SUPABASE Configuration
supabase:
  s3:
    endpoint: ${SUPABASE_S3_ENDPOINT}
    region: ${SUPABASE_S3_REGION}
    access-key: ${SUPABASE_S3_ACCESS_KEY}
    secret-key: ${SUPABASE_S3_SECRET_KEY}
    bucket-name: ${SUPABASE_S3_BUCKET}